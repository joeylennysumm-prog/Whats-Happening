version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: messaging
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  gateway:
    build:
      context: ../../
      dockerfile: backend/gateway/Dockerfile
    env_file: ../../.env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  realtime:
    build:
      context: ../../
      dockerfile: backend/realtime/Dockerfile
    env_file: ../../.env
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  pg_data:

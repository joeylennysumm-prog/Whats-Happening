apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime
  namespace: messaging-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime
  template:
    metadata:
      labels:
        app: realtime
    spec:
      containers:
        - name: realtime
          image: your-registry/realtime:latest
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: realtime
  namespace: messaging-platform
spec:
  selector:
    app: realtime
  ports:
    - port: 8081
      targetPort: 8081

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: messaging-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: your-registry/gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: messaging-platform
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 8080
